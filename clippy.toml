# Clippy configuration for snowid-rust
# Enforces code quality rules similar to our JS/TS (oxlint) and Go (golangci-lint) setups

# === Complexity Limits ===

# Cognitive complexity threshold (like eslint complexity: 10, gocognit)
cognitive-complexity-threshold = 10

# Maximum number of function parameters (like eslint max-params: 3)
too-many-arguments-threshold = 4

# Maximum lines per function (like eslint max-lines-per-function: 50)
too-many-lines-threshold = 50

# Maximum nesting depth (like eslint max-depth: 3)
excessive-nesting-threshold = 4

# === Size Limits ===

# Warn when passing large structs by value
pass-by-value-size-limit = 256

# Warn on large stack allocations
stack-size-threshold = 131072

# Warn on large enum variants
enum-variant-size-threshold = 128

# Warn on unnecessary Vec<Box<T>> when T is large
vec-box-size-threshold = 256

# === Type Complexity ===

# Maximum type complexity before warning (prevents AI from creating huge generic types)
type-complexity-threshold = 200

# === Readability ===

# Minimum digits before suggesting underscore separators
literal-representation-threshold = 16

# === Trait Bounds ===

# Maximum number of trait bounds on a single type (prevents AI trait bound explosion)
max-trait-bounds = 4

# === Enum Variant Naming ===

# Minimum enum variant name length before linting
enum-variant-name-threshold = 3

# === Import Style ===

# Warn on wildcard imports (AI loves `use foo::*`)
warn-on-all-wildcard-imports = true

# === Minimum Supported Rust Version ===
# Clippy uses this to gate lints that require newer language features.
# Should match the `rust-version` field in Cargo.toml.
msrv = "1.90.0"


# === API Stability ===
# Don't suggest changes that would break the public API (semver-sensitive)
avoid-breaking-exported-api = false

# === Stack Safety ===
# Warn on types larger than this that are passed on the stack instead of boxed
too-large-for-stack = 4096

# === Formatting ===
# Allow comments above attributes (e.g., doc comments above #[derive])
accept-comment-above-attributes = true

# === Test Organization ===

# Allow unwrap/expect in tests (test code has different standards)
allow-unwrap-in-tests = true
allow-expect-in-tests = true
