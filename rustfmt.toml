# rustfmt configuration for snowid-rust
# Compact formatting: dense, readable, AI-slop-resistant

# === Line Width ===
max_width = 100

# === Shorthands ===
use_field_init_shorthand = true
use_try_shorthand = true

# === Import style ===
reorder_imports = true
reorder_modules = true

# === Derives ===
merge_derives = true

# === Compact layouts ===
# Keep function params on one line when possible
fn_params_layout = "Compressed"
# Be aggressive about fitting things on one line
use_small_heuristics = "Max"
# Shorter arrays stay on one line
array_width = 80
# Struct literals stay on one line longer
struct_lit_width = 40
# Struct variants stay on one line longer
struct_variant_width = 50
# Longer chains before breaking
chain_width = 80
# Short array elements threshold
short_array_element_width_threshold = 15
# Single-line if-else max width
single_line_if_else_max_width = 80
# Match block trailing comma for cleaner diffs
match_block_trailing_comma = true
